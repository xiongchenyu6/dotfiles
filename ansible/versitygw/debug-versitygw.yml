---
# debug-versitygw.yml - 调试 VersityGW 配置
- name: Debug VersityGW Configuration
  hosts: versitygw_servers
  become: yes
  tasks:
    - name: Check VersityGW service status
      shell: systemctl status versitygw
      register: service_status
      changed_when: false
      failed_when: false

    - name: Load encrypted variables
      community.sops.load_vars:
        file: ../../secrets/versitygw.yaml
      no_log: true
      ignore_errors: yes

    - name: Display service status
      debug:
        msg: "{{ service_status.stdout_lines }}"

    - name: Check environment file
      shell: cat /etc/versitygw/versitygw.env
      register: env_file
      changed_when: false

    - name: Display environment file (masked)
      debug:
        msg: |
          Environment file contents:
          {{ env_file.stdout | regex_replace('(SECRET_KEY=).*', '\\1***MASKED***') }}

    - name: Check VersityGW logs
      shell: journalctl -u versitygw -n 50 --no-pager
      register: logs
      changed_when: false

    - name: Display recent logs
      debug:
        msg: "{{ logs.stdout_lines[-20:] }}"

    - name: Check IAM directory
      shell: ls -la /var/lib/versitygw/iam/ 2>/dev/null || echo "IAM directory empty or not found"
      register: iam_dir
      changed_when: false

    - name: Display IAM directory contents
      debug:
        msg: "{{ iam_dir.stdout_lines }}"

    - name: Read users.json content
      shell: cat /var/lib/versitygw/iam/users.json
      register: users_json_content
      changed_when: false
      failed_when: false

    - name: Display users.json
      debug:
        msg: "{{ users_json_content.stdout }}"

    - name: Test local S3 access with curl
      shell: |
        curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7070/ || echo "Connection failed"
      register: curl_test
      changed_when: false

    - name: Display curl test result
      debug:
        msg: "HTTP response code: {{ curl_test.stdout }}"

    - name: List IAM Users (Admin CLI)
      shell: |
        /usr/local/bin/versitygw admin \
          --access "{{ versitygw.root_access_key }}" \
          --secret "{{ versitygw.root_secret_key }}" \
          --endpoint-url "http://127.0.0.1:7070" \
          list-users
      register: list_users_result
      ignore_errors: yes
      changed_when: false

    - name: Display IAM Users
      debug:
        msg: "{{ list_users_result.stdout_lines | default(list_users_result.stderr_lines) }}"

    - name: List Buckets (Admin CLI)
      shell: |
        /usr/local/bin/versitygw admin \
          --access "{{ versitygw.root_access_key }}" \
          --secret "{{ versitygw.root_secret_key }}" \
          --endpoint-url "http://127.0.0.1:7070" \
          list-buckets
      register: list_buckets_result
      ignore_errors: yes
      changed_when: false

    - name: Display Buckets
      debug:
        msg: "{{ list_buckets_result.stdout_lines | default(list_buckets_result.stderr_lines) }}"
