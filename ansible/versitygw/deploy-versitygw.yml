---
- name: Deploy Versitygw S3 Gateway (Binary/Systemd)
  hosts: versitygw_servers
  become: yes
  vars:
    versitygw_version: "1.1.0"
    versitygw_port: 7070
    versitygw_data_dir: /data/versitygw
    versitygw_user: versitygw
    versitygw_group: versitygw
    versitygw_download_url: "https://github.com/versity/versitygw/releases/download/v{{ versitygw_version }}/versitygw_v{{ versitygw_version }}_Linux_x86_64.tar.gz"
    root_access_key: "{{ versitygw.root_access_key }}"
    root_secret_key: "{{ versitygw.root_secret_key }}"

  tasks:
    - name: Load encrypted variables
      community.sops.load_vars:
        file: ../../secrets/versitygw.yaml
      no_log: true

    - name: Create versitygw group
      group:
        name: "{{ versitygw_group }}"
        system: yes
        state: present

    - name: Create versitygw user
      user:
        name: "{{ versitygw_user }}"
        group: "{{ versitygw_group }}"
        system: yes
        shell: /usr/sbin/nologin
        home: /var/lib/versitygw
        create_home: yes
        state: present

    - name: Create data directory
      file:
        path: "{{ versitygw_data_dir }}"
        state: directory
        owner: "{{ versitygw_user }}"
        group: "{{ versitygw_group }}"
        mode: "0755"

    - name: Install dependencies
      apt:
        name:
          - curl
          - tar
        state: present
        update_cache: yes

    - name: Download and install versitygw binary
      unarchive:
        src: "{{ versitygw_download_url }}"
        dest: /usr/local/bin
        remote_src: yes
        extra_opts:
          - --strip-components=1
        include:
          - "versitygw_v{{ versitygw_version }}_Linux_x86_64/versitygw"
        owner: root
        group: root
        mode: "0755"
      notify: restart versitygw

    - name: Create configuration directory
      file:
        path: /etc/versitygw
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create environment configuration file
      copy:
        content: |
          ROOT_ACCESS_KEY={{ root_access_key }}
          ROOT_SECRET_KEY={{ root_secret_key }}
          VGW_BACKEND=posix
          VGW_PORT=:{{ versitygw_port }}
        dest: /etc/versitygw/versitygw.env
        owner: root
        group: root
        mode: "0600"
      notify: restart versitygw

    - name: Create Systemd service
      copy:
        content: |
          [Unit]
          Description=Versity S3 Gateway
          Documentation=https://github.com/versity/versitygw
          After=network.target

          [Service]
          User={{ versitygw_user }}
          Group={{ versitygw_group }}
          EnvironmentFile=/etc/versitygw/versitygw.env
          ExecStart=/usr/local/bin/versitygw posix {{ versitygw_data_dir }}
          Restart=on-failure
          RestartSec=5s
          LimitNOFILE=65536

          # Security Hardening
          ProtectSystem=full
          PrivateTmp=true
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/versitygw.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - reload systemd
        - restart versitygw

    - name: Configure UFW firewall
      ufw:
        rule: allow
        port: "{{ versitygw_port }}"
        proto: tcp
        comment: "Versitygw S3 Gateway"

    - name: Allow SSH through UFW
      ufw:
        rule: allow
        port: "{{ ansible_port | default(22) }}"
        proto: tcp
        comment: "SSH access"

    - name: Enable UFW
      ufw:
        state: enabled
        default: deny
        direction: incoming

    - name: Start and enable versitygw service
      systemd:
        name: versitygw
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Wait for service to be ready
      wait_for:
        port: "{{ versitygw_port }}"
        host: localhost
        delay: 2
        timeout: 30

    - name: Display deployment status
      debug:
        msg: |
          ========================================
          Versitygw Systemd Deployment: SUCCESS
          ========================================
          Service: versitygw.service
          Port: {{ versitygw_port }}
          Data Dir: {{ versitygw_data_dir }}

          Test S3 Access:
          aws --endpoint-url=http://{{ ansible_host }}:{{ versitygw_port }} s3 ls
          ========================================

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart versitygw
      systemd:
        name: versitygw
        state: restarted
