---
- name: Deploy Sub2API AI Gateway
  hosts: sub2api_servers
  become: yes
  vars_files:
    - vars/main.yml

  pre_tasks:
    # Sudo password lives in secrets/sub2api-<profile>.yaml (sops). Default
    # profile is "autolife" — override on the command line with `-e profile=...`
    # if other deployments come online.
    - name: Load sudo password from sops (secrets/sub2api-{{ profile | default('autolife') }}.yaml)
      community.sops.load_vars:
        file: "../../secrets/sub2api-{{ profile | default('autolife') }}.yaml"
      no_log: true
      delegate_to: localhost
      become: false
      run_once: true

    - name: Apply ansible_become_pass from secrets if provided
      set_fact:
        ansible_become_pass: "{{ sub2api.become_password }}"
      when: sub2api.become_password is defined
      no_log: true

  tasks:
    - name: Install required packages
      apt:
        name: "{{ sub2api_apt_packages | default(['curl', 'docker.io', 'docker-compose-v2', 'nginx']) }}"
        state: present
        update_cache: yes
        cache_valid_time: 3600
      when: (sub2api_apt_packages | default(['curl', 'docker.io', 'docker-compose-v2', 'nginx']) | length) > 0

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create deployment directory
      file:
        path: "{{ sub2api_deploy_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Create data directories
      file:
        path: "{{ sub2api_deploy_dir }}/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - data
        - postgres_data
        - redis_data

    # Persist generated secrets so reruns don't rotate the postgres password
    # (which would brick the DB on the next reboot).
    - name: Check for previously persisted secrets
      stat:
        path: "{{ sub2api_deploy_dir }}/.secrets.yml"
      register: sub2api_secrets_stat

    - name: Load previously persisted secrets
      slurp:
        src: "{{ sub2api_deploy_dir }}/.secrets.yml"
      register: sub2api_secrets_blob
      when: sub2api_secrets_stat.stat.exists
      no_log: true

    - name: Parse persisted secrets into facts
      set_fact:
        sub2api_persisted: "{{ sub2api_secrets_blob.content | b64decode | from_yaml }}"
      when: sub2api_secrets_stat.stat.exists
      no_log: true

    - name: Resolve POSTGRES_PASSWORD
      set_fact:
        sub2api_postgres_password: "{{ sub2api_postgres_password
          | default(sub2api_persisted.sub2api_postgres_password | default(lookup('ansible.builtin.pipe', 'openssl rand -hex 32'))) }}"
      no_log: true

    - name: Resolve REDIS_PASSWORD
      set_fact:
        sub2api_redis_password: "{{ sub2api_redis_password
          | default(sub2api_persisted.sub2api_redis_password | default(lookup('ansible.builtin.pipe', 'openssl rand -hex 32'))) }}"
      no_log: true

    - name: Resolve JWT_SECRET
      set_fact:
        sub2api_jwt_secret: "{{ sub2api_jwt_secret
          | default(sub2api_persisted.sub2api_jwt_secret | default(lookup('ansible.builtin.pipe', 'openssl rand -hex 32'))) }}"
      no_log: true

    - name: Resolve TOTP_ENCRYPTION_KEY
      set_fact:
        sub2api_totp_key: "{{ sub2api_totp_key
          | default(sub2api_persisted.sub2api_totp_key | default(lookup('ansible.builtin.pipe', 'openssl rand -hex 32'))) }}"
      no_log: true

    - name: Resolve ADMIN_PASSWORD
      set_fact:
        sub2api_admin_password: "{{ sub2api_admin_password
          | default(sub2api_persisted.sub2api_admin_password | default(lookup('ansible.builtin.pipe', 'openssl rand -hex 16'))) }}"
      no_log: true

    - name: Persist secrets to {{ sub2api_deploy_dir }}/.secrets.yml
      copy:
        content: |
          ---
          sub2api_postgres_password: "{{ sub2api_postgres_password }}"
          sub2api_redis_password: "{{ sub2api_redis_password }}"
          sub2api_jwt_secret: "{{ sub2api_jwt_secret }}"
          sub2api_totp_key: "{{ sub2api_totp_key }}"
          sub2api_admin_password: "{{ sub2api_admin_password }}"
        dest: "{{ sub2api_deploy_dir }}/.secrets.yml"
        owner: root
        group: root
        mode: '0600'
      no_log: true

    - name: Deploy docker-compose.yml
      template:
        src: templates/docker-compose.yml.j2
        dest: "{{ sub2api_deploy_dir }}/docker-compose.yml"
        owner: root
        group: root
        mode: '0600'
      notify: restart sub2api

    - name: Deploy .env file
      template:
        src: templates/env.j2
        dest: "{{ sub2api_deploy_dir }}/.env"
        owner: root
        group: root
        mode: '0600'

    - name: Pull latest images (best-effort; tolerates mirror flakiness)
      command: docker compose pull --ignore-pull-failures
      args:
        chdir: "{{ sub2api_deploy_dir }}"
      register: sub2api_pull
      changed_when: "'Pull complete' in sub2api_pull.stdout or 'Downloaded' in sub2api_pull.stdout"
      failed_when: false

    - name: Start services
      command: docker compose up -d
      args:
        chdir: "{{ sub2api_deploy_dir }}"

    - name: Ensure TLS cert is in place
      stat:
        path: "{{ sub2api_ssl_cert }}"
      register: sub2api_cert_stat

    - name: Fail if TLS cert is missing
      fail:
        msg: "TLS cert not found at {{ sub2api_ssl_cert }}. Issue via acme.sh first."
      when: not sub2api_cert_stat.stat.exists

    - name: Deploy nginx vhost
      template:
        src: templates/nginx-sub2api.conf.j2
        dest: /etc/nginx/sites-available/sub2api
        owner: root
        group: root
        mode: '0644'
      notify: reload nginx

    - name: Enable nginx vhost
      file:
        src: /etc/nginx/sites-available/sub2api
        dest: /etc/nginx/sites-enabled/sub2api
        state: link
      notify: reload nginx

    - name: Validate nginx config
      command: nginx -t
      changed_when: false

    - name: Wait for sub2api to be healthy
      uri:
        url: "http://127.0.0.1:{{ sub2api_server_port }}/health"
        status_code: 200
      register: health_check
      retries: 12
      delay: 5
      until: health_check.status == 200
      ignore_errors: yes

    - name: Display deployment status
      debug:
        msg: |
          ========================================
          Sub2API deployment status: {{ 'SUCCESS' if health_check.status | default(0) == 200 else 'STARTING' }}
          ========================================
          Deploy dir: {{ sub2api_deploy_dir }}
          Public URL: https://{{ sub2api_domain }}
          Local URL:  http://127.0.0.1:{{ sub2api_server_port }}
          Admin email: {{ sub2api_admin_email }}
          Secrets:    {{ sub2api_deploy_dir }}/.secrets.yml (mode 0600)
          ========================================

  handlers:
    - name: restart sub2api
      command: docker compose restart
      args:
        chdir: "{{ sub2api_deploy_dir }}"

    - name: reload nginx
      systemd:
        name: nginx
        state: reloaded
