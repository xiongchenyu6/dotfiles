---
# =============================================================================
# Sub2API Deployment Variables
# =============================================================================

# Server configuration
sub2api_server_port: 8082
sub2api_server_mode: release
sub2api_run_mode: standard
sub2api_bind_host: "127.0.0.1"

# Public domain (terminated by host nginx; cert managed by acme.sh)
sub2api_domain: sub2api.starslab.qzz.io
sub2api_ssl_cert: /etc/nginx/ssl/sub2api.crt
sub2api_ssl_key: /etc/nginx/ssl/sub2api.key

# Deployment directory on remote host
sub2api_deploy_dir: /opt/sub2api

# Docker image
sub2api_image: weishaw/sub2api:latest

# PostgreSQL
sub2api_postgres_user: sub2api
sub2api_postgres_db: sub2api

# Redis
sub2api_redis_db: 0

# Admin account
sub2api_admin_email: admin@starslab.qzz.io

# JWT
sub2api_jwt_expire_hour: 24

# Timezone
sub2api_tz: Asia/Shanghai

# H2C
sub2api_h2c_enabled: true

# Docker Compose local version (uses local dirs for easy migration)
sub2api_use_local_dirs: true
