# RustFS reverse-proxy via *.gz.autolife.ai
# Cert: /etc/nginx/certs/gz/ (auto-renewed by acme.sh)
# Carrier blocks 80/443 -> using 8444.

# Limit concurrent HTTP/1.1 connections per client IP. The console's
# folder-download fans out parallel GetObject requests for large MKV/MP4
# videos; without throttling RustFS 1.0.0-beta.3 buffers each object in
# RAM and OOMs at ~27G on this 30G host. limit_conn requires HTTP/1.1 so
# each stream is a real TCP conn (HTTP/2 would multiplex through one).
limit_conn_zone $binary_remote_addr zone=rustfs_per_ip:10m;

# ---------------------------------------------------------------------------
# s3.gz.autolife.ai:8444 -> RustFS S3 API (:9000) -- straight pass-through.
# Used by SDK clients (rclone/mc/boto3) which manage their own concurrency.
#
# nginx 1.24 sets http2 at the port-socket level (not per-vhost), so both
# vhosts on :8444 must match. We disable http2 here too because (a) SDK
# clients default to HTTP/1.1, and (b) the rustfs.gz block needs HTTP/1.1
# for browser-driven concurrency control (see comment below).
# ---------------------------------------------------------------------------
server {
    listen 8444 ssl;
    listen [::]:8444 ssl;
    server_name s3.gz.autolife.ai;

    ssl_certificate     /etc/nginx/certs/gz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/gz/key.pem;

    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_http_version 1.1;
    chunked_transfer_encoding on;
    proxy_connect_timeout 60s;
    proxy_send_timeout    1800s;
    proxy_read_timeout    1800s;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ---------------------------------------------------------------------------
# rustfs.gz.autolife.ai:8444 -> console (:9001) + S3 admin API (:9000) on the
# same origin. The Next.js console issues admin requests against its own
# origin, so the API must live alongside the static assets.
#
# HTTP/2 is deliberately OFF here: the console's batch folder-download
# opens many parallel GetObject streams. Over HTTP/2 they share one TCP
# connection and bypass the browser's 6-per-origin limit, which OOMs
# RustFS. HTTP/1.1 keeps the browser cap and limit_conn enforces 3/IP.
# ---------------------------------------------------------------------------
server {
    listen 8444 ssl;
    listen [::]:8444 ssl;
    server_name rustfs.gz.autolife.ai;

    ssl_certificate     /etc/nginx/certs/gz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/gz/key.pem;

    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_http_version 1.1;
    chunked_transfer_encoding on;
    proxy_connect_timeout 60s;
    proxy_send_timeout    1800s;
    proxy_read_timeout    1800s;

    # Static console UI lives on :9001 at /rustfs/console/*
    location /rustfs/console/ {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  8444;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # Everything else goes to the S3 / admin API on :9000. Cap concurrent
    # GetObject streams per IP so a batch folder-download can't pin enough
    # large videos in memory to OOM RustFS.
    location / {
        limit_conn rustfs_per_ip 6;
        limit_conn_status 503;
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
